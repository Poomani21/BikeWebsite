<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .nf{min-height:100vh;display:grid;place-items:center;text-align:center;padding:2rem}
    .nf h1{font-size:6rem;margin:0}
    .nf a{display:inline-block;margin-top:1rem;padding:.75rem 1.5rem;background:#e11d48;color:#fff;border-radius:.5rem;text-decoration:none}
  </style>
</head>
<body>
  <div class="nf">
    <div>
      <h1>404</h1>
      <p>The page you're looking for doesn't exist.</p>
      <a href="index.html">Back to Home</a>
    </div>
  </div>
</body>
</html>
